services:
  - type: web
    name: utuwagatari
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /up
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false  # Renderダッシュボードで設定
      - key: DATABASE_URL
        sync: false  # 外部MySQLのURL (例: mysql2://user:pass@host/dbname)
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: auto   # Cloudflare R2 の場合は "auto"、AWS S3 の場合は "ap-northeast-1" など
      - key: AWS_BUCKET
        sync: false
      - key: AWS_ENDPOINT
        sync: false   # Cloudflare R2 の場合のみ設定 (例: https://xxx.r2.cloudflarestorage.com)
      - key: APP_HOST
        sync: false   # 本番ドメイン (例: utuwagatari.com)
      - key: RAILS_LOG_LEVEL
        value: info
