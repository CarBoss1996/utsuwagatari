# /etc/nginx/sites-available/utuwagatari_staging
# ln -s /etc/nginx/sites-available/utuwagatari_staging /etc/nginx/sites-enabled/
#
# staging は staging.yourdomain.com 固定で動かす（サブドメインなし）
# 店舗はサブドメインで識別するため、staging 環境では
# *.staging.yourdomain.com でアクセスする想定

upstream puma_staging {
  server unix:///var/www/utuwagatari_staging/shared/tmp/sockets/puma.sock fail_timeout=0;
}

server {
  listen 80;
  server_name *.staging.yourdomain.com staging.yourdomain.com;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  server_name *.staging.yourdomain.com staging.yourdomain.com;

  ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  root /var/www/utuwagatari_staging/current/public;

  location ^~ /assets/ {
    gzip_static on;
    expires max;
    add_header Cache-Control public;
  }

  location / {
    proxy_pass http://puma_staging;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_connect_timeout 300;
    proxy_read_timeout    300;
  }

  error_page 500 502 503 504 /500.html;
  client_max_body_size 20M;
  keepalive_timeout 10;
}
